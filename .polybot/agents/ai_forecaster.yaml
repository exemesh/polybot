# AIForecaster Agent Charter
agent: ai_forecaster
display_name: AIForecaster
description: "Uses Claude LLM as superforecaster to evaluate candidate markets"

allowed_market_categories:
  - all

allowed_api_domains:
  - gamma-api.polymarket.com
  - clob.polymarket.com
  - api.anthropic.com

max_single_trade_usd: 3.0
max_daily_trades: 5         # LLM calls are expensive — conservative limit
min_edge_pct: 0.02
max_position_pct: 0.08
max_llm_calls_per_cycle: 10

canary_eligible: true
canary_market_slice: 0.10

hitl_size_threshold_usd: 10.0    # lower threshold — LLM confidence can be overfit
hitl_confidence_threshold: 0.80

created_at: 2026-03-23
version: "1.0"
notes: >
  LLM edge is soft. Require higher human oversight. Shadow new prompt variants
  for at least 20 cycles before promoting. Never trust >95% confidence from LLM alone.
