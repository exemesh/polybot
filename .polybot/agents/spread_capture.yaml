# SpreadCapture Agent Charter
agent: spread_capture
display_name: SpreadCapture
description: "Captures bid-ask spread on liquid markets — guaranteed profit if both legs fill"

allowed_market_categories:
  - all

allowed_api_domains:
  - gamma-api.polymarket.com
  - clob.polymarket.com

max_single_trade_usd: 5.0
max_daily_trades: 20
min_edge_pct: 0.01          # lower bar — spread capture is near-guaranteed
max_position_pct: 0.10
min_book_liquidity_usd: 500 # only enter if order book has >$500 depth

canary_eligible: false      # spread capture logic is deterministic — no canary needed

hitl_size_threshold_usd: 10.0
hitl_confidence_threshold: 0.95

created_at: 2026-03-23
version: "1.0"
notes: "Only trades when BOTH legs (YES+NO) can be simultaneously placed for guaranteed profit"
