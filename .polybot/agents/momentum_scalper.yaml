# MomentumScalper Agent Charter
agent: momentum_scalper
display_name: MomentumScalper
description: "Trades near-expiry markets where price momentum signals near-resolution"

allowed_market_categories:
  - all

allowed_api_domains:
  - gamma-api.polymarket.com
  - clob.polymarket.com

max_single_trade_usd: 2.0
max_daily_trades: 8
min_edge_pct: 0.03
max_position_pct: 0.08
max_hours_to_expiry: 48     # only trades expiring within 48h

canary_eligible: true
canary_market_slice: 0.10

hitl_size_threshold_usd: 1.0
hitl_confidence_threshold: 0.88

created_at: 2026-03-23
version: "1.0"
notes: "High-frequency near-expiry plays. Tight risk limits due to binary outcome risk."
