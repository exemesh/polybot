# WeatherArb Agent Charter
# Version-controlled behavioral specification for WeatherArbStrategy
# Edit this file to adjust behavior. Changes take effect on next bot cycle.

agent: weather_arb
display_name: WeatherArb
description: "Identifies mispriced weather outcome markets using NOAA/OpenMeteo data"

# ── Allowed actions ──────────────────────────────────────────────────────────
allowed_market_categories:
  - weather
  - temperature
  - precipitation
  - climate

allowed_api_domains:
  - gamma-api.polymarket.com
  - clob.polymarket.com
  - api.open-meteo.com
  - api.openweathermap.org
  - api.weather.gov

# ── Risk limits ──────────────────────────────────────────────────────────────
max_single_trade_usd: 5.0
max_daily_trades: 10
min_edge_pct: 0.03          # 3% minimum edge (higher bar — data-dependent)
max_position_pct: 0.10      # max 10% of portfolio per position
min_days_to_expiry: 1
max_days_to_expiry: 14

# ── Canary settings ──────────────────────────────────────────────────────────
canary_eligible: true
canary_market_slice: 0.10

# ── Human-in-the-loop ────────────────────────────────────────────────────────
hitl_size_threshold_usd: 2.0
hitl_confidence_threshold: 0.90

# ── Metadata ─────────────────────────────────────────────────────────────────
created_at: 2026-03-23
version: "1.0"
notes: "Primary edge source: NOAA 7-day forecast vs Polymarket implied probability"
