# CrossPlatformArb Agent Charter
agent: cross_platform_arb
display_name: CrossPlatformArb
description: "Exploits price discrepancies for identical events across Polymarket/Kalshi"

allowed_market_categories:
  - politics
  - economics
  - elections
  - crypto
  - sports

allowed_api_domains:
  - gamma-api.polymarket.com
  - clob.polymarket.com
  - api.elections.kalshi.com

max_single_trade_usd: 10.0
max_daily_trades: 15
min_edge_pct: 0.02
max_position_pct: 0.12
min_arb_spread_pct: 0.02    # minimum spread between platforms to enter

canary_eligible: true
canary_market_slice: 0.10

hitl_size_threshold_usd: 2.0
hitl_confidence_threshold: 0.90

created_at: 2026-03-23
version: "1.0"
notes: "Pure arbitrage — both legs must be available simultaneously to enter"
